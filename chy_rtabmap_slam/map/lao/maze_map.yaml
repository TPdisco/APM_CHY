# ============================================================================
# 静态地图元数据文件
#
# 使用方法：
#   1. 先启动rtabmap SLAM模式建图（使用原slam.launch.py的SLAM版本）
#   2. 保存地图: ros2 run nav2_map_server map_saver_cli -f ~/maze_map
#      这会生成 maze_map.yaml 和 maze_map.pgm 两个文件
#   3. 将生成的文件复制到此map/目录，替换此模板
#   4. 启动纯定位模式: ros2 launch chy_rtabmap_slam localization.launch.py
#
# 参数说明：
#   image: 地图图像文件路径（相对于此yaml文件的路径）
#   resolution: 地图分辨率（米/像素），需与rtabmap建图时一致
#   origin: 地图左下角在世界坐标系中的位置 [x, y, yaw]
#   negate: 是否反转图像（0=正常，1=反转）
#   occupied_thresh: 占用阈值（大于此值视为障碍物）
#   free_thresh: 空闲阈值（小于此值视为可通行区域）
# ============================================================================

image: maze_map.pgm
resolution: 0.05
origin: [-25.0, -25.0, 0.0]
negate: 0
occupied_thresh: 0.65
free_thresh: 0.196
