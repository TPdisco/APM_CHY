      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node






controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    current_goal_checker: "general_goal_checker"  # ✅ 添加这行消除警告

    # 通用目标检查器
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true
    
    # 进度检查器
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25
      movement_time_allowance: 10.0
    
    # DWB 局部规划器
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory: false
      # 增加这些参数
      sim_time: 2.0  # 增加预测时间
      max_vel_xy: 0.5
      min_vel_xy: -0.5
      # 考虑无人机特性
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.17
      latch_xy_goal_tolerance: true
      
      min_vel_x: -0.5
      max_vel_x: 0.5
      min_vel_y: -0.5
      max_vel_y: 0.5
      max_vel_theta: 1.0
      min_speed_xy: 0.0       # 允许纯旋转
      max_speed_xy: 0.5
      min_speed_theta: 0.2
      acc_lim_x: 2.5
      acc_lim_y: 2.5
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: -2.5
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 10
      vtheta_samples: 20
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.1
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "PreferForward"]
      BaseObstacle.scale: 0.02
      PathDist.scale: 32.0
      PreferForward.scale: 0.0     # 多旋翼不需要偏好前进
      PathAlign.scale: 10.0        # 启用路径对齐
      GoalAlign.scale: 10.0        # 启用目标对齐
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    
    # NavFn 全局规划器
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5                    # 目标容忍度
      use_astar: true                   # A* 算法
      allow_unknown: true               # 允许穿越未知区域

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true
      refinement_num: 2
      w_data: 0.2
      w_smooth: 0.3

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap
    global_costmap_topic: global_costmap/costmap
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"

# 代价地图配置 - 关键部分
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      track_unknown_space: true
      always_send_full_costmap: true
      rolling_window: false       #保持非滚动，但设置更大的边界
      width: 50                   # 增大尺寸
      height: 50
      origin_x: -25.0             # 以 (0,0) 为中心
      origin_y: -25.0
      resolution: 0.05
      
      # 层配置
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      # 静态层 - RTAB-Map 栅格地图
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        map_topic: /map
        first_map_only: false
        track_unknown_space: true
        trinary_costmap: true
      
      # 障碍层 - 双目点云
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: point_cloud
        point_cloud:
          topic: /cloud_map    # RTAB-Map 点云
          data_type: "PointCloud2"
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
          obstacle_range: 5.0
          raytrace_range: 6.0
          clearing: true
          marking: true
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      
      # clearing_services:
      #   - clear_entirely_global_costmap
      #   - clear_except_global_costmap
      #   - clear_around_robot_global_costmap

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      # Voxel 层 - 处理 3D 点云
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 20        # 30 * 0.1 = 3 米高度范围
        # 结果 z 范围：-1.0 到 2.0 米
        max_obstacle_height: 5.0
        min_obstacle_height: 0.0
        unknown_threshold: 15    # 未知单元阈值
        mark_threshold: 0
        # observation_sources: scan
        # scan:
        #   topic: /scan
        #   max_obstacle_height: 2.0
        #   clearing: True
        #   marking: True
        #   data_type: "LaserScan"
        #   raytrace_max_range: 3.0
        #   raytrace_min_range: 0.0
        #   obstacle_max_range: 2.5
        #   obstacle_min_range: 0.0
        observation_sources: point_cloud
        point_cloud:
          topic: /local_grid_obstacle  # 局部障碍物点云
          data_type: "PointCloud2"
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5
          obstacle_range: 2.5
          raytrace_range: 3.0
          clearing: true
          marking: true
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
      # # 确保清除服务可用
      # clearing_services:  
      #   - clear_entirely_local_costmap
      #   - clear_except_local_costmap
      #   - clear_around_robot_local_costmap

